name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    needs: sdk
    container: fedora:latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: Enable RPM Fusion
        run: |
          dnf install -y https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm

      - name: Install dependencies
        run: |
          dnf -y update
          dnf -y install libstdc++-static gcc-c++ ninja-build mesa-libGL-devel mesa-libGLU-devel libX11-devel libXrandr-devel libXinerama-devel libXcursor-devel libXi-devel wayland-devel libxkbcommon-devel mingw64-gcc mingw32-gcc alsa-lib-devel pulseaudio-libs-devel cmake cc65 openssl-devel mingw64-openssl mingw64-openssl-static mingw64-zlib-static wget curl git tar which gcc git-core make fribidi-devel pipewire-devel libXext-devel libXfixes-devel libXScrnSaver-devel libXtst-devel dbus-devel ibus-devel systemd-devel mesa-libGLES-devel mesa-libEGL-devel vulkan-devel wayland-protocols-devel libdrm-devel mesa-libgbm-devel libusb1-devel libdecor-devel pipewire-jack-audio-connection-kit-devel libthai-devel liburing-devel zlib-ng-compat-static python3-jinja2 ccache ucrt64-gcc ucrt64-gcc-c++ ucrt64-crt ucrt64-headers ucrt64-binutils ucrt64-openssl-static ucrt64-zlib-static ucrt64-openssl ucrt64-zlib libsndfile-devel ffmpeg-devel ImageMagick librsvg2-tools dosfstools mtools

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download SDK Artifact
        uses: actions/download-artifact@v8
        with:
          name: SDK
          path: .

      - name: Fix Git Trust
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: |
            ccache-linux-

      - name: Cache CMake dependencies
        uses: actions/cache@v5
        with:
          path: build/release/_deps
          key: deps-linux-${{ hashFiles('CMakeLists.txt') }}

      - name: Build Linux
        run: |
          chmod +x scripts/build-linux.sh
          ./scripts/build-linux.sh

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v6
        with:
          name: SIM_65C02-linux
          path: output/SIM_65C02

  build-windows:
    runs-on: ubuntu-latest
    needs: sdk
    container: fedora:latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: Enable RPM Fusion
        run: |
          dnf install -y https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm

      - name: Install dependencies
        run: |
          dnf -y update
          dnf -y install libstdc++-static ninja-build mingw64-gcc mingw64-gcc-c++ mingw32-gcc mingw32-gcc-c++ cmake mingw64-openssl mingw64-openssl-static mingw64-zlib-static ccache git tar which gcc-c++ mesa-libGL-devel mesa-libGLU-devel libX11-devel libXrandr-devel libXinerama-devel libXcursor-devel libXi-devel wayland-devel libxkbcommon-devel alsa-lib-devel pulseaudio-libs-devel cc65 openssl-devel wget curl gcc git-core make fribidi-devel pipewire-devel libXext-devel libXfixes-devel libXScrnSaver-devel libXtst-devel dbus-devel ibus-devel systemd-devel mesa-libGLES-devel mesa-libEGL-devel vulkan-devel wayland-protocols-devel libdrm-devel mesa-libgbm-devel libusb1-devel libdecor-devel pipewire-jack-audio-connection-kit-devel libthai-devel liburing-devel zlib-ng-compat-static python3-jinja2 ucrt64-gcc ucrt64-gcc-c++ ucrt64-crt ucrt64-headers ucrt64-binutils ucrt64-openssl-static ucrt64-zlib-static ucrt64-openssl ucrt64-zlib unzip ImageMagick librsvg2-tools dosfstools mtools

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download SDK Artifact
        uses: actions/download-artifact@v8
        with:
          name: SDK
          path: .

      - name: Fix Git Trust
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-windows-${{ github.sha }}
          restore-keys: |
            ccache-windows-

      - name: Cache CMake dependencies
        uses: actions/cache@v5
        with:
          path: build_win/release/_deps
          key: deps-windows-${{ hashFiles('CMakeLists.txt') }}

      - name: Build Windows
        run: |
          chmod +x scripts/build-win.sh
          ./scripts/build-win.sh

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v6
        with:
          name: SIM_65C02-windows
          path: output/SIM_65C02.exe

      - name: Upload Unit Tests
        uses: actions/upload-artifact@v6
        with:
          name: windows-unit-tests
          path: build_win/release/unit_tests.exe

  test-windows:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Install Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32

      - name: Download Unit Tests
        uses: actions/download-artifact@v8
        with:
          name: windows-unit-tests
          path: .

      - name: Run Windows Tests
        run: wine unit_tests.exe

  sdk:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: |
          dnf -y update
          dnf -y install cc65 python3-pip zip git dosfstools mtools
          pip3 install pillow mido

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Fix Git Trust
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Create SDK
        run: |
          chmod +x scripts/create-sdk.sh
          ./scripts/create-sdk.sh

      - name: Upload SDK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: SDK
          path: SDK.zip

  build-web:
    runs-on: ubuntu-latest
    needs: sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cc65 jq python3-pip zip imagemagick librsvg2-bin dosfstools mtools
          pip3 install pillow mido --break-system-packages

      - name: Download SDK Artifact
        uses: actions/download-artifact@v8
        with:
          name: SDK
          path: .

      - name: Extract SDK
        run: |
          unzip -o SDK.zip
          chmod +x scripts/compile-bin.sh scripts/image-to-bin.sh scripts/midi-to-bin.sh

      - name: Compile SDK ROMs and Assets
        run: |
          chmod +x scripts/create-sdk.sh
          ./scripts/create-sdk.sh

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build Web
        run: |
          chmod +x scripts/build-web.sh
          ./scripts/build-web.sh --clean
          mkdir -p output/web/roms
          cp output/cartridge/*.65c output/web/roms/ 2>/dev/null || true
          
          # Generate structured JSON
          ROMS_JSON=$(ls output/rom/*.bin 2>/dev/null | xargs -n 1 basename | sed 's/\.bin$/.65c/' | jq -R . | jq -s . || echo "[]")
          MIDIS_JSON=$(ls output/midi/*.bin 2>/dev/null | xargs -n 1 basename | sed 's/\.bin$/.65c/' | jq -R . | jq -s . || echo "[]")
          VRAMS_JSON=$(ls output/vram/*.bin 2>/dev/null | xargs -n 1 basename | sed 's/\.bin$/.65c/' | jq -R . | jq -s . || echo "[]")
          jq -n --argjson r "$ROMS_JSON" --argjson m "$MIDIS_JSON" --argjson v "$VRAMS_JSON" \
            '{roms: $r, midis: $m, vrams: $v}' > output/web/roms/roms.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/web
          force_orphan: true

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, test-windows, build-web, sdk]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v8
        with:
          name: SIM_65C02-linux
          path: output

      - name: Download Windows Artifact
        uses: actions/download-artifact@v8
        with:
          name: SIM_65C02-windows
          path: output

      - name: Download SDK Artifact
        uses: actions/download-artifact@v8
        with:
          name: SDK
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            output/SIM_65C02
            output/SIM_65C02.exe
            SDK.zip

  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          path: main-repo

      - name: Checkout wiki repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-repo

      - name: Sync files and push to Wiki
        run: |
          rsync -av --delete --exclude='.git/' main-repo/wiki/ wiki-repo/

          cd wiki-repo

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff-index --quiet HEAD --; then
            echo "No changes in wiki to sync."
          else
            git commit -m "Auto-sync wiki for tag ${{ github.ref_name }}"
            git push
          fi
