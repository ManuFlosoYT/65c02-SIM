<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self';">
    <title>65C02 Simulator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Cross-Origin-Isolation for SharedArrayBuffer (pthreads) -->
    <script src="coi-serviceworker.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #canvas {
            border-radius: 1px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 100vw;
            max-height: 100vh;
            background-color: #000;
        }

        .loader {
            position: absolute;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        progress {
            width: 200px;
            height: 8px;
            border-radius: 4px;
            margin-top: 10px;
        }

        progress::-webkit-progress-bar { background-color: #333; border-radius: 4px; }
        progress::-webkit-progress-value { background-color: #4a9eff; border-radius: 4px; }

        #status {
            margin-bottom: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <div id="status">Loading...</div>
        <progress value="0" max="100" id="progress"></progress>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type='text/javascript'>
      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var loaderElement = document.getElementById('loader');

      var Module = {
        preRun: [],
        postRun: [],
        print: (function() {
          return function(text) {
            if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
            console.log(text);
          };
        })(),
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);
          return canvas;
        })(),
        setStatus: function(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) return; // if this is a progress update, skip it if too soon
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2])*100;
            progressElement.max = parseInt(m[4])*100;
          } else {
            progressElement.value = null;
            progressElement.max = null;
          }
          statusElement.innerHTML = text;
          if (text === "") {
              loaderElement.style.display = 'none';
          }
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All dependencies loaded.');
        }
      };
      Module.setStatus('Downloading...');
      window.onerror = function() {
        Module.setStatus('Exception thrown, see JavaScript console');
        loaderElement.style.display = 'flex';
        statusElement.style.color = 'red';
      };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
